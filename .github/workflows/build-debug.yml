name: Build Debug APK

# 任意 push 或 PR 都触发,构建 debug APK (无需签名密钥)
# 产出可直接安装的 debug APK 用于测试

on:
  push:
    branches: [ main, 'fix/**', 'feat/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: build-debug-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: apex-root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup_ndk
        with:
          ndk-version: r28b
          link-to-sdk: true

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: apex-root-debug-v1.0.1
          path: apex-root/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            apex-root/app/build/reports/
            apex-root/app/.cxx/
          retention-days: 7
