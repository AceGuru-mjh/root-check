build:
  weights:
    complexity: 2
    LongParameterList: 1
    style: 1

config:
  validation: true
  excludes: []

processors:
  active: true
  exclude: []

console-reports:
  active: true
  exclude:
    - 'ProjectStatisticsReport'
    - 'ComplexityReport'
    - 'NotificationReport'
    - 'FindingsReport'
    - 'FileBasedFindingsReport'

output-reports:
  active: true
  exclude: []

comments:
  active: true
  CommentOverPrivateFunction:
    active: false
  CommentOverPrivateProperty:
    active: false
  EndOfSentenceFormat:
    active: false
  UndocumentedPublicClass:
    active: false
  UndocumentedPublicFunction:
    active: false
  UndocumentedPublicProperty:
    active: false

complexity:
  active: true
  CyclomaticComplexMethod:
    threshold: 15
  LongMethod:
    threshold: 80
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 10
  MethodOverloading:
    active: false
  NamedArguments:
    active: false
  TooManyFunctions:
    thresholdInFiles: 15
    thresholdInClasses: 15
    thresholdInInterfaces: 15
    thresholdInObjects: 15
    thresholdInEnums: 15

coroutines:
  active: true
  GlobalCoroutineUsage:
    active: false
  RedundantSuspendModifier:
    active: true

empty-blocks:
  active: true
  EmptyCatchBlock:
    active: false
  EmptyClassBlock:
    active: false
  EmptyDefaultConstructor:
    active: false
  EmptyFunctionBlock:
    active: false
  EmptyIfBlock:
    active: false
  EmptyInitBlock:
    active: false
  EmptySecondaryConstructor:
    active: false
  EmptyWhenBlock:
    active: false
  EmptyWhileBlock:
    active: false
  EmptyTryBlock:
    active: false

exceptions:
  active: true
  ExceptionRaisedInUnexpectedLocation:
    active: false
  ThrowingExceptionsWithoutMessageOrCause:
    active: false
  ThrowingNewInstanceOfSameException:
    active: false
  TooGenericExceptionCaught:
    active: false

naming:
  active: true
  BooleanPropertyNaming:
    active: false
  ClassNaming:
    pattern: '[A-Z][a-zA-Z0-9]*'
  ConstructorParameterNaming:
    pattern: '[a-z][a-zA-Z0-9]*'
  EnumNaming:
    pattern: '[A-Z][a-zA-Z0-9]*'
  ForbiddenClassName:
    active: false
  FunctionMaxLength:
    active: false
  FunctionMinLength:
    active: false
  FunctionNaming:
    pattern: '[a-z][a-zA-Z0-9]*'
  FunctionParameterNaming:
    pattern: '[a-z][a-zA-Z0-9]*'
  InvalidPackageDeclaration:
    active: false
  LambdaParameterNaming:
    pattern: '[a-z][a-zA-Z0-9]*'
  MatchingDeclarationName:
    active: true
  MemberNameEqualsClassName:
    active: false
  ObjectPropertyNaming:
    pattern: '[a-z][a-zA-Z0-9]*'
  PackageNaming:
    pattern: '[a-z][a-zA-Z0-9._]*'
  TopLevelPropertyNaming:
    pattern: '[A-Za-z][a-zA-Z0-9]*'
  VariableMaxLength:
    active: false
  VariableMinLength:
    active: false
  VariableNaming:
    pattern: '[a-z][a-zA-Z0-9]*'

performance:
  active: true
  ArrayPrimitive:
    active: false
  CouldBeSequence:
    active: false
  ForEachOnRange:
    active: false
  UnnecessaryTemporaryInstantiation:
    active: false

potential-bugs:
  active: true
  CastToNullableType:
    active: false
  Deprecation:
    active: false
  DontDowncastCollectionType:
    active: false
  ExitOutsideMain:
    active: false
  HasPlatformType:
    active: false
  IgnoredReturnValue:
    active: false
  ImplicitDefaultLocale:
    active: false
  InvalidRange:
    active: true
  LateinitUsage:
    active: false
  MapGetWithNotNullAssertionOperator:
    active: false
  MissingPackageDeclaration:
    active: false
  NullableToStringCall:
    active: false
  UnnecessaryNotNullCheck:
    active: false
  UnnecessaryNotNullOperator:
    active: false
  UnreachableCode:
    active: true
  UnusedUnaryOperator:
    active: false
  UselessPostfixExpression:
    active: false

style:
  active: true
  CanBeNonNullable:
    active: false
  CascadingCallWrapping:
    active: false
  ClassOrdering:
    active: false
  DataClassContainsFunctions:
    active: false
  DataClassShouldBeImmutable:
    active: false
  DestructuringDeclarationWithTooManyEntries:
    active: false
  ForbiddenComment:
    active: false
  FunctionOnlyReturningConstant:
    active: false
  LoopWithTooManyJumpStatements:
    active: false
  MagicNumber:
    active: false
  MandatoryBracesIfSingleExpression:
    active: false
  MaxChainedCallsOnSameLine:
    active: false
  MayBeConst:
    active: false
  NestedClassesVisibility:
    active: false
  NewLineAtEndOfFile:
    active: true
  NoTabs:
    active: false
  ObjectLiteralToLambda:
    active: false
  OptionalAbstractKeyword:
    active: false
  OptionalUnit:
    active: false
  PreferToOverPairSyntax:
    active: false
  ProtectedMemberInFinalClass:
    active: false
  RedundantExplicitType:
    active: false
  RedundantHigherOrderMapUsage:
    active: false
  SpacingBetweenPackageAndImports:
    active: false
  ThrowsCount:
    active: false
  TrailingWhitespace:
    active: false
  UnderscoresInNumericLiterals:
    active: false
  UnnecessaryAbstractClass:
    active: false
  UnnecessaryAnnotationUseSiteTarget:
    active: false
  UnnecessaryApply:
    active: false
  UnnecessaryBackticks:
    active: false
  UnnecessaryFilter:
    active: false
  UnnecessaryLet:
    active: false
  UnnecessaryParentheses:
    active: false
  UntilInsteadOfRangeTo:
    active: false
  UnusedImports:
    active: true
  UnusedParameter:
    active: false
  UnusedPrivateClass:
    active: true
  UnusedPrivateMember:
    active: true
  UnusedPrivateProperty:
    active: true
  UseCheckOrError:
    active: false
  UseDataClass:
    active: false
  UseEmptyCounterpart:
    active: false
  UseRequire:
    active: false
  UselessCallOnNotNull:
    active: false
  UtilityClassWithPublicConstructor:
    active: false
  VarCouldBeVal:
    active: true
  WildcardImport:
    active: false
