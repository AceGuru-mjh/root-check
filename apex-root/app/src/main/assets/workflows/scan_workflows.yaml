        service_name: "Mount Check"
        timeout_ms: 30000
        optional: false
      - service_id: 5
        service_name: "Side-channel Analysis"
        timeout_ms: 60000
        optional: false
      - service_id: 6
        service_name: "Kernel Integrity Probe"
        timeout_ms: 30000
        optional: false
      - service_id: 7
        service_name: "TEE TrustZone Bypass"
        timeout_ms: 15000
        optional: false
      - service_id: 8
        service_name: "Bootloader Detector"
        timeout_ms: 10000
